# Algorithm registry. Source: market_pulse/docs/ALGO_REFERENCE.md (2026-04-12).
# To add a new algo later: append an entry here + map it to an account in accounts.yaml.
#
# status:
#   ready   — strategy selector implemented, backtester can run
#   planned — scaffolded only; UI shows "coming soon" and /Admin blocks Run
#
# When promoting a planned algo to ready:
#   1. Wire its risk tier into market_pulse select_strategy_for_tier (or fork
#      it into this repo's strategies/ package).
#   2. Flip status: ready and enabled: true.

algos:
